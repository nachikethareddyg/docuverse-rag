services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: docuverse
      POSTGRES_USER: docuverse
      POSTGRES_PASSWORD: docuverse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docuverse -d docuverse"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
